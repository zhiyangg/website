version: 2
updates:
  # npm dependencies — routine version bumps, batched into one PR monthly.
  # Security fixes are handled separately by Dependabot security updates and
  # open immediately when a vulnerability is found, regardless of this schedule.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  # GitHub Actions used by the workflows (checkout, setup-node, etc.) —
  # also batched into one PR monthly so the actions stay patched.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "github-actions"
